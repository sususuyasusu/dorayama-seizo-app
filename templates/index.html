<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>どら山 製造アプリ</title>
<style>
  :root{--line:#e7e3da;--muted:#8a8780;--ink:#2c2c2a;--info:#185fa5;--infobg:#e6f1fb;--bg:#f4f2ec;--warn:#854f0b;--warnbg:#faeeda;--ok:#0f6e56;--okbg:#e1f5ee;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:66px;}
  .hd{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5;}
  .hd b{font-size:16px;font-weight:600;}.hd .tab{margin-left:auto;font-size:12px;color:var(--muted);}
  .days{display:flex;gap:5px;padding:11px 12px 6px;justify-content:space-between;overflow-x:auto;}
  .day{flex:0 0 auto;font-size:12px;color:var(--muted);padding:6px 8px;border-radius:8px;border:0;background:none;}
  .day.on{color:var(--info);background:var(--infobg);font-weight:600;}
  .legend{margin:2px 14px 6px;padding:8px 10px;background:#faf8f3;border-radius:8px;font-size:11px;color:var(--muted);}
  .row{display:flex;align-items:center;padding:11px 16px;border-top:1px solid var(--line);}
  .nm{flex:1;min-width:0;}.nm .t{font-size:15px;font-weight:600;}.nm .s{font-size:11px;color:var(--muted);margin-top:2px;}
  .stp{display:flex;align-items:center;gap:9px;}
  .stp button{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;color:var(--ink);}
  .stp button:active{transform:scale(.95);}.val{width:48px;text-align:center;font-size:21px;font-weight:600;}
  .sum{display:flex;gap:10px;padding:14px 16px;background:#faf8f3;border-top:1px solid var(--line);flex-wrap:wrap;}
  .card{flex:1;min-width:120px;background:#fff;border-radius:8px;padding:10px 12px;}.card .l{font-size:12px;color:var(--muted);}.card .n{font-size:21px;font-weight:600;}
  .biz{display:flex;align-items:baseline;padding:11px 16px;border-top:1px solid var(--line);gap:10px;}
  .biz .wd{width:26px;font-weight:600;font-size:14px;}.biz .amt{font-size:17px;font-weight:600;flex:1;}
  .biz .sub{font-size:11px;color:var(--muted);text-align:right;}
  .mat{display:flex;align-items:center;padding:10px 16px;border-top:1px solid var(--line);}
  .mat .nm2{flex:1;font-size:14px;}.mat .ord{font-size:16px;font-weight:600;}.mat .dt{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
  .egg{margin:10px 14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .egg .top{display:flex;align-items:center;gap:8px;padding:10px 12px;}.egg.today .top{background:var(--infobg);}.egg.act{border-color:#e7c98a;}
  .egg .wd{font-size:14px;font-weight:600;}.egg .st{margin-left:auto;font-size:12px;color:var(--muted);}
  .egg .todo{padding:4px 12px 10px;}.egg .ln{font-size:13px;line-height:1.5;padding:3px 0;}
  .egg .hdln{font-size:12px;font-weight:600;color:var(--warn);background:var(--warnbg);display:inline-block;padding:2px 8px;border-radius:6px;margin:2px 0 4px;}
  .sec{padding:12px 16px 4px;font-size:12px;font-weight:600;color:var(--muted);}
  .note{margin:10px 14px 4px;padding:9px 11px;background:#faf8f3;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.6;}
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;background:#fff;border-top:1px solid var(--line);}
  .nav button{flex:1;border:0;background:none;padding:9px 0 7px;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;}
  .nav button .ic{font-size:19px;}.nav button.on{color:var(--info);}
  .hide{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><b id="title">製造入力</b><span class="tab" id="tab"></span></div>

  <div id="make">
    <div class="days" id="days"></div>
    <div class="legend">予定＝事前のだいたい ／ <b style="color:var(--ink)">作った数</b>＝当日その場で上書き ／ 売れた数＝エアレジ自動</div>
    <div id="rows"></div>
    <div class="sum">
      <div class="card"><div class="l">店舗 作った数 合計</div><div class="n" id="tot">–</div></div>
      <div class="card"><div class="l">回転数（製造表 本日）</div><div class="n" id="kai">–</div></div>
    </div>
  </div>

  <div id="egg" class="hide"><div class="note" id="eggnote">読込中…</div><div id="eggdays"></div></div>

  <div id="sales" class="hide">
    <div class="sum">
      <div class="card"><div class="l">今週 売上（実績）</div><div class="n" id="wsa">–</div></div>
      <div class="card"><div class="l">今週 売上（予定）</div><div class="n" id="wsp">–</div></div>
    </div>
    <div class="sec">日別 売上・回転・人件費</div>
    <div id="salesdays"></div>
  </div>

  <div id="mat" class="hide">
    <div class="sec">材料 推奨発注量（実績ベース）</div>
    <div id="matlist"></div>
    <div class="sec">配送便別 卵まとめ</div>
    <div id="delivlist"></div>
  </div>
</div>

<div class="nav">
  <button id="nav-make" class="on" onclick="show('make')"><span class="ic">🍪</span>製造入力</button>
  <button id="nav-egg" onclick="show('egg')"><span class="ic">🥚</span>卵発注</button>
  <button id="nav-sales" onclick="show('sales')"><span class="ic">💴</span>売上</button>
  <button id="nav-mat" onclick="show('mat')"><span class="ic">🧂</span>材料・配送</button>
</div>

<script>
let W=null,sel=(new Date().getDay()+6)%7;
const SC=['make','egg','sales','mat'],TT={make:'製造入力',egg:'卵発注',sales:'売上',mat:'材料・配送'};
function show(s){SC.forEach(x=>{document.getElementById(x).classList.toggle('hide',x!==s);document.getElementById('nav-'+x).classList.toggle('on',x===s);});document.getElementById('title').textContent=TT[s];}
async function J(u){return (await fetch(u)).json();}

async function load(){
  W=await J('/api/week');
  document.getElementById('tab').textContent='店舗用 ・ '+W.tab;
  const dd=document.getElementById('days');dd.innerHTML='';
  W.days.forEach((d,i)=>{const b=document.createElement('button');b.className='day'+(i===sel?' on':'');b.textContent=d.label;b.onclick=()=>{sel=i;renderMake();};dd.appendChild(b);});
  renderMake();
  renderEgg(await J('/api/eggs'));
  renderSales(await J('/api/cost'));
  renderMat(await J('/api/materials'));
}
function renderMake(){
  document.querySelectorAll('.day').forEach((b,i)=>b.classList.toggle('on',i===sel));
  const box=document.getElementById('rows');box.innerHTML='';let tot=0;
  W.products.forEach(p=>{
    const made=(p.made[sel]??p.sold[sel]??0),plan=p.plan[sel]??0,sold=p.sold[sel];tot+=Number(made)||0;
    const r=document.createElement('div');r.className='row';
    r.innerHTML='<div class="nm"><div class="t">'+p.name+'</div><div class="s">予定 '+plan+' ／ 売れた数 '+(sold==null?'–':sold)+'</div></div>'+
      '<div class="stp"><button>−</button><div class="val">'+made+'</div><button>＋</button></div>';
    const v=r.querySelector('.val'),bs=r.querySelectorAll('button');bs[0].onclick=()=>chg(p,-1,v);bs[1].onclick=()=>chg(p,1,v);box.appendChild(r);
  });
  document.getElementById('tot').textContent=Math.round(tot);
  const k=W.kaiten[sel];document.getElementById('kai').textContent=(k==null?'–':k);
}
function chg(p,d,v){let cur=Number(p.made[sel]??p.sold[sel]??0)+d;if(cur<0)cur=0;p.made[sel]=cur;v.textContent=cur;
  let tot=0;W.products.forEach(x=>tot+=Number(x.made[sel]??x.sold[sel]??0));document.getElementById('tot').textContent=Math.round(tot);
  fetch('/api/made',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tab:W.tab,product:p.name,dayIndex:sel,value:cur})});}
function renderEgg(E){
  document.getElementById('eggnote').textContent=E.note||'';
  const box=document.getElementById('eggdays');box.innerHTML='';
  E.days.forEach((d,i)=>{const act=d.todo&&d.todo.length>0;const el=document.createElement('div');el.className='egg'+(i===sel?' today':'')+(act?' act':'');
    let todo='';if(act){todo='<div class="todo">'+d.todo.map(t=>t.indexOf('📦')===0?'<div class="hdln">'+t+'</div>':'<div class="ln">'+t+'</div>').join('')+'</div>';}
    el.innerHTML='<div class="top"><span class="wd">'+d.weekday+' '+(d.date||'').slice(5)+'</span><span class="st">卵黄残 '+(d.yolk||'–')+' ／ 卵白残 '+(d.white||'–')+'</span></div>'+todo;box.appendChild(el);});
}
function renderSales(C){
  document.getElementById('wsa').textContent=C.weekSalesActual||'–';
  document.getElementById('wsp').textContent=C.weekSalesPlan||'–';
  const box=document.getElementById('salesdays');box.innerHTML='';
  C.days.forEach((d,i)=>{const el=document.createElement('div');el.className='biz';if(i===sel)el.style.background='var(--infobg)';
    el.innerHTML='<span class="wd">'+d.d+'</span><span class="amt">'+(d.salesActual||'–')+'</span>'+
      '<span class="sub">回転 '+(d.kaiten||'–')+'<br>人件費 '+(d.labor||'–')+'</span>';box.appendChild(el);});
}
function renderMat(M){
  const ml=document.getElementById('matlist');ml.innerHTML='';
  M.materials.forEach(m=>{const el=document.createElement('div');el.className='mat';
    el.innerHTML='<div class="nm2">'+m.name+'</div><div style="text-align:right"><div class="ord">'+(m.order||'–')+' '+(m.unit||'')+'</div><div class="dt">入荷 '+(m.arrive||'–')+'</div></div>';ml.appendChild(el);});
  const dl=document.getElementById('delivlist');dl.innerHTML='';
  M.delivery.forEach(d=>{const el=document.createElement('div');el.className='egg';
    el.innerHTML='<div class="top"><span class="wd">'+d.name+'</span></div><div class="todo"><div class="ln">卵黄 '+(d.yolkKai||'–')+'回転（'+(d.yolkG||'–')+'g）</div><div class="ln">卵白 '+(d.whiteKai||'–')+'回転（'+(d.whiteG||'–')+'g）</div></div>';dl.appendChild(el);});
}
load();
</script>
</body>
</html>
