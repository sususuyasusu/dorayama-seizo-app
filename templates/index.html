<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>どら山 製造アプリ</title>
<style>
  :root{--appw:480px;--line:#e8e3d8;--muted:#8c887f;--ink:#2a2824;--info:#1565a6;--infobg:#e8f1fb;--bg:#f6f3ec;--warn:#8a5410;--warnbg:#fbeed6;--brand:#7a4a26;--shadow:0 1px 3px rgba(70,55,30,.07),0 1px 2px rgba(70,55,30,.04);}
  .card,.scard,.ecard,.egg,.batch,.rules,.eggrule,.note{box-shadow:var(--shadow);}
  .hd{box-shadow:0 1px 0 rgba(70,55,30,.05);}
  .nav{box-shadow:0 -1px 10px rgba(70,55,30,.06);}
  .blk.on,.day.on,.stp button{box-shadow:var(--shadow);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:var(--appw);margin:0 auto;background:#fff;min-height:100vh;padding-bottom:66px;}
  .hd{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5;}
  .hd b{font-size:15px;font-weight:600;}
  .hd select{margin-left:auto;font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);max-width:46%;}
  .blks{display:flex;gap:6px;padding:10px 12px 2px;overflow-x:auto;}
  .blk{flex:0 0 auto;font-size:12px;padding:6px 12px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap;}
  .blk.on{background:var(--info);border-color:var(--info);color:#fff;font-weight:600;}
  .blk .cat{font-size:10px;opacity:.7;margin-left:4px;}
  .days{display:flex;gap:5px;padding:9px 12px 6px;justify-content:space-between;overflow-x:auto;}
  .day{flex:0 0 auto;font-size:12px;color:var(--muted);padding:6px 8px;border-radius:8px;border:0;background:none;white-space:nowrap;}
  .day.on{color:var(--info);background:var(--infobg);font-weight:600;}
  .dayw{font-size:10px;display:block;margin-top:1px;font-weight:400;}
  .wxline{margin:4px 14px 0;padding:7px 11px;background:#eef4fb;border-radius:8px;font-size:12px;color:#185fa5;font-weight:600;}
  .wxline:empty{display:none;}
  .invrow{display:flex;align-items:center;padding:9px 16px;border-top:1px solid var(--line);gap:10px;}
  .invrow.need{background:#fff7f3;}
  .invn{flex:1;min-width:0;}.invt{font-size:14px;font-weight:600;}.invs{font-size:11px;color:var(--muted);margin-top:2px;}
  .invq{text-align:right;min-width:60px;}.invnum{font-size:16px;font-weight:600;}.invmin{font-size:11px;color:var(--muted);}
  .legend{margin:2px 14px 6px;padding:8px 10px;background:#faf8f3;border-radius:8px;font-size:11px;color:var(--muted);}
  .row{display:flex;align-items:center;padding:11px 16px;border-top:1px solid var(--line);}
  .nm{flex:1;min-width:0;}.nm .t{font-size:15px;font-weight:600;}.nm .s{font-size:11px;color:var(--muted);margin-top:2px;}
  .stp{display:flex;align-items:center;gap:9px;}
  .stp button{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;color:var(--ink);}
  .stp button:active{transform:scale(.95);}
  .val{width:64px;text-align:center;font-size:22px;font-weight:600;border:none;border-bottom:2px solid var(--line);background:transparent;color:var(--ink);padding:3px 0;border-radius:0;}
  .val:focus{outline:none;border-bottom-color:var(--info);}
  #sheetbar{position:fixed;top:0;left:0;right:0;max-width:var(--appw);margin:0 auto;height:46px;display:flex;align-items:center;padding:0 12px;background:#fff;border-bottom:1px solid var(--line);z-index:6;}
  #sheetweek{flex:1;min-width:0;height:36px;font-size:16px;font-weight:600;padding:4px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
  #rawmode{height:36px;font-size:13px;font-weight:600;padding:0 12px;margin-left:8px;border:1px solid var(--info);border-radius:9px;background:var(--infobg);color:var(--info);white-space:nowrap;}
  .zbtn{height:36px;width:34px;flex:0 0 auto;font-size:19px;font-weight:600;line-height:1;margin-left:6px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
  .zbtn:active{transform:scale(.95);}
  #rawgrid{position:fixed;top:46px;left:0;right:0;max-width:var(--appw);margin:0 auto;bottom:54px;overflow:auto;background:#fff;z-index:5;padding:4px;}
  #rawgrid table.rawt td{min-width:46px;}
  #sheetwrap{position:fixed;top:46px;left:0;right:0;max-width:var(--appw);margin:0 auto;bottom:54px;overflow:hidden;background:#fff;z-index:5;}
  #sheetframe{width:100%;height:100%;border:0;display:block;}
  @media (max-width:640px){#sheetframe{width:154%;height:154%;transform:scale(.65);transform-origin:top left;}}
  .sum{display:flex;gap:10px;padding:14px 16px;background:#faf8f3;border-top:1px solid var(--line);flex-wrap:wrap;}
  .card{flex:1;min-width:120px;background:#fff;border-radius:8px;padding:10px 12px;}.card .l{font-size:12px;color:var(--muted);}.card .n{font-size:21px;font-weight:600;}
  .biz{display:flex;align-items:baseline;padding:11px 16px;border-top:1px solid var(--line);gap:10px;}
  .biz .wd{width:42px;font-weight:600;font-size:13px;}.biz .amt{font-size:17px;font-weight:600;flex:1;}.biz .sub{font-size:11px;color:var(--muted);text-align:right;}
  .mat{display:flex;align-items:center;padding:10px 16px;border-top:1px solid var(--line);}
  .mat .nm2{flex:1;font-size:14px;}.mat .ord{font-size:16px;font-weight:600;}.mat .dt{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
  .egg{margin:10px 14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .egg .top{display:flex;align-items:center;gap:8px;padding:10px 12px;}.egg.today .top{background:var(--infobg);}.egg.act{border-color:#e7c98a;}
  .egg .wd{font-size:14px;font-weight:600;}.egg .st{margin-left:auto;font-size:12px;color:var(--muted);}
  .pbadge{margin-left:8px;font-size:12px;color:var(--info);font-weight:600;background:var(--infobg);border-radius:8px;padding:1px 7px;}
  .egg .todo{padding:4px 12px 10px;}.egg .ln{font-size:13px;line-height:1.5;padding:3px 0;}
  .egg .hdln{font-size:12px;font-weight:600;color:var(--warn);background:var(--warnbg);display:inline-block;padding:2px 8px;border-radius:6px;margin:2px 0 4px;}
  .sec{padding:12px 16px 4px;font-size:12px;font-weight:600;color:var(--muted);}
  .note{margin:10px 14px 4px;padding:9px 11px;background:#faf8f3;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.6;}
  .rawwrap{overflow:auto;margin:8px;border:1px solid var(--line);border-radius:8px;max-height:78vh;}
  table.rawt{border-collapse:collapse;font-size:var(--rawfs,11px);}
  table.rawt td{border:1px solid var(--line);padding:2px 5px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  table.rawt tr:first-child td{font-weight:600;background:#faf8f3;}
  .ecard{margin:9px 14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .ecard .eh{padding:8px 13px;background:#faf8f3;font-weight:600;font-size:14px;display:flex;align-items:center;}
  .erow{display:flex;align-items:center;padding:9px 13px;border-top:1px solid var(--line);gap:8px;}
  .erow .lbl{width:52px;font-size:13px;font-weight:600;}
  .erow .kv{flex:1;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:12px;color:var(--muted);}
  .erow .kv b{color:var(--ink);font-weight:600;}
  .chip{font-size:12px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap;}
  .chip.ok{background:#e1f5ee;color:#0f6e56;}.chip.warn{background:var(--warnbg);color:var(--warn);}
  .chip.bad{background:#fcebeb;color:#a32d2d;}.chip.na{background:#f1efe8;color:var(--muted);}
  .estock{display:inline-block;min-width:30px;text-align:center;border-bottom:1px dashed var(--info);color:var(--info);font-weight:600;padding:0 2px;}
  .planedit{display:inline-block;min-width:24px;text-align:center;border-bottom:1px dashed var(--info);color:var(--ink);font-weight:600;padding:0 4px;}
  .planedit:focus{outline:none;border-bottom-color:var(--info);background:#eef4fb;}
  .dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .dot-w{background:#fff;border:1px solid #b9b4a6;}
  .dot-y{background:#f4c84a;border:1px solid #d3a838;}
  .todoln{font-size:12.5px;color:var(--info);padding:0 13px 9px 66px;line-height:1.45;font-weight:600;}
  .eggrule{margin:0 14px 6px;padding:7px 11px;background:#eef4fb;border-radius:8px;font-size:11px;color:#185fa5;line-height:1.6;}
  .scard{margin:8px 14px;border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;}
  .scard .sl{font-weight:600;font-size:14px;width:62px;flex:0 0 auto;}
  .scard .sv{flex:1;display:flex;justify-content:space-between;align-items:baseline;font-size:13px;}
  .scard .sp{color:var(--muted);}.scard .sa{font-weight:600;font-size:15px;}
  .stpwrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .stplbl{font-size:10px;color:var(--muted);}
  .nm .s b{color:var(--ink);font-weight:600;}
  .batch{margin:8px 14px;border:1px solid var(--line);border-radius:10px;padding:10px 13px;}
  .batch .bn{font-weight:600;font-size:14px;margin-bottom:3px;}.batch .bd{font-size:12px;color:var(--muted);line-height:1.7;}
  .rules{margin:8px 14px 16px;border:1px solid var(--line);border-radius:10px;}
  .rules summary{font-size:13px;font-weight:600;padding:10px 12px;cursor:pointer;color:var(--ink);}
  .rules .rl{font-size:12px;color:var(--ink);padding:6px 12px;border-top:1px solid var(--line);line-height:1.55;}
  .rsh{font-size:12.5px;font-weight:600;color:var(--ink);padding:9px 12px 4px;background:#faf8f3;border-top:1px solid var(--line);}
  .rsl{font-size:12px;color:var(--ink);padding:4px 12px 4px 18px;line-height:1.5;border-top:0.5px solid var(--line);}
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:var(--appw);margin:0 auto;display:flex;background:#fff;border-top:1px solid var(--line);}
  .nav button{flex:1;border:0;background:none;padding:8px 0 6px;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .nav button .ic{font-size:18px;}.nav button.on{color:var(--info);}
  .ankocard{margin:8px 14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .ankocard .ah{padding:9px 13px;background:#faf8f3;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between;}
  .ankocard .ah .sup{font-size:11px;color:var(--muted);font-weight:400;}
  .arow{display:flex;align-items:baseline;padding:7px 13px;border-top:1px solid var(--line);gap:8px;font-size:13px;}
  .arow .lb{color:var(--muted);width:68px;flex:0 0 auto;}
  .arow b{font-size:15px;font-weight:600;}
  .arow .sub{color:var(--muted);font-size:11px;margin-left:auto;}
  .aorder{padding:10px 13px;border-top:1px solid var(--line);background:var(--infobg);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
  .aorder b{font-size:21px;color:var(--info);}
  .junin{display:flex;align-items:center;gap:6px;padding:9px 13px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);flex-wrap:wrap;background:#fffdf7;}
  .junin input{width:66px;height:30px;text-align:center;font-size:15px;font-weight:600;border:1px solid var(--info);border-radius:8px;background:#fff;color:var(--ink);}
  .hide{display:none;}
  @media (min-width:768px){
    :root{--appw:720px;}
    .wrap{box-shadow:0 0 0 1px var(--line),0 8px 34px rgba(70,55,30,.09);}
  }
  @media (min-width:1200px){:root{--appw:840px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><b id="title">製造計画</b><select id="wk"></select></div>

  <div id="make">
    <div class="blks" id="blks"></div>
    <div class="days" id="days"></div>
    <div class="legend"><b style="color:var(--ink)">予算</b>＝事前の計画 ／ <b style="color:var(--ink)">実績（作った数）</b>＝本日以降は予算を表示（手入力で調整可）、昨日以前は実売（エアレジ/Airメイト）を自動反映 ／ <b style="color:var(--ink)">売れた</b>＝実際に売れた数（エアレジ/Airメイト）</div>
    <div class="wxline" id="wxline"></div>
    <div id="rows"></div>
    <div class="sum">
      <div class="card"><div class="l"><span id="totlbl">作った数</span> 合計</div><div class="n" id="tot">–</div></div>
      <div class="card"><div class="l">回転数（製造表 当日）</div><div class="n" id="kai">–</div></div>
    </div>
  </div>

  <div id="egg" class="hide">
    <div class="note" id="eggnote">読込中…</div>
    <div class="eggrule" id="eggrule"></div>
    <div id="eggdaylist"></div>
    <div class="sec">翌週の正味発注数（配送便別）</div>
    <div id="eggbatches"></div>
    <details class="rules"><summary>📖 この表の見方（こうなったら→こうする）</summary><div id="eggguide"></div></details>
    <details class="rules"><summary>📋 卵発注ルール</summary><div id="eggruleslist"></div></details>
  </div>

  <div id="sales" class="hide">
    <div class="sec">この週の製造実績（予算 → 実績）</div>
    <div id="salessum"></div>
    <div class="sec">日別（店舗・催事）</div>
    <div id="salesdays"></div>
  </div>

  <div id="mat" class="hide">
    <div class="sec">🫘 あん発注（来週分・在庫連動）<span id="ankonext"></span></div><div id="ankolist"></div>
    <div class="sec">材料（必要量 × 在庫）<span id="matneed"></span></div><div id="matlist"></div>
    <div class="sec">📦 その他の在庫（包材・消耗品など）<span id="invneed"></span></div><div id="invlist"></div>
  </div>

  <div id="raw" class="hide">
    <div id="sheetbar"><select id="sheetweek"></select><button class="zbtn" onclick="zoomStep(-1)" aria-label="小さく表示" title="小さく">－</button><button class="zbtn" onclick="zoomStep(1)" aria-label="大きく表示" title="大きく">＋</button><button id="rawmode" onclick="toggleRaw()">🔳 シート表示</button></div>
    <div id="sheetwrap" class="hide"><iframe id="sheetframe" title="製造表（本物・直接編集）"></iframe></div>
    <div id="rawgrid"></div>
  </div>
</div>

<div class="nav">
  <button id="nav-make" class="on" onclick="show('make')"><span class="ic"><svg viewBox="0 0 24 24" style="width:20px;height:20px;display:block" aria-label="どらやき" xmlns="http://www.w3.org/2000/svg"><path d="M3.4 12 Q12 3.2 20.6 12 Q12 20.8 3.4 12 Z" fill="#D89A4A" stroke="#B9792F" stroke-width="0.8"/><path d="M3.8 12 Q12 4 20.2 12 Z" fill="#EAB76C"/><ellipse cx="12" cy="12.1" rx="8" ry="1.35" fill="#6B3A2A"/></svg></span>製造計画</button>
  <button id="nav-egg" onclick="show('egg')"><span class="ic">🥚</span>卵発注</button>
  <button id="nav-sales" onclick="show('sales')"><span class="ic">💴</span>製造実績</button>
  <button id="nav-mat" onclick="show('mat')"><span class="ic"><svg viewBox="0 0 24 24" style="width:20px;height:20px;display:block" aria-label="段ボール" xmlns="http://www.w3.org/2000/svg"><path d="M3.6 9 L3.6 5.4 L12 5.4 L12 9 Z" fill="#E0B36F" stroke="#9C6B2C" stroke-width="0.8" stroke-linejoin="round"/><path d="M12 9 L12 5.4 L20.4 5.4 L20.4 9 Z" fill="#C68E45" stroke="#9C6B2C" stroke-width="0.8" stroke-linejoin="round"/><rect x="3.6" y="9" width="16.8" height="10.8" rx="1.1" fill="#D3A05C" stroke="#9C6B2C" stroke-width="0.8"/><line x1="12" y1="9" x2="12" y2="19.8" stroke="#9C6B2C" stroke-width="0.9"/></svg></span>材料配送</button>
  <button id="nav-raw" onclick="show('raw')"><span class="ic">📋</span>全データ</button>
</div>

<script>
let W=null,sel=(new Date().getDay()+6)%7,selBlk=0,curTab='',curRawTab='';
const SC=['make','egg','sales','mat','raw'],TT={make:'製造計画',egg:'卵発注',sales:'製造実績',mat:'材料・配送',raw:'全データ'};
function show(s){SC.forEach(x=>{document.getElementById(x).classList.toggle('hide',x!==s);document.getElementById('nav-'+x).classList.toggle('on',x===s);});document.getElementById('title').textContent=TT[s];if(s==='raw')setSheet();}
async function fetchJSON(u){for(let i=0;i<3;i++){try{const r=await fetch(u,{cache:'no-store'});const x=await r.text();if(x&&x.trim())return JSON.parse(x);}catch(e){}await new Promise(s=>setTimeout(s,400*(i+1)));}throw new Error('取得失敗: '+u);}
async function J(u){const sep=u.includes('?')?'&':'?';const t=curTab?(sep+'tab='+encodeURIComponent(curTab)):'';return fetchJSON(u+t);}

async function init(){
  const tabs=await fetchJSON('/api/tabs');
  W=await J('/api/week');           // tab未指定＝今週
  curTab=W.tab;
  const wk=document.getElementById('wk');wk.innerHTML='';
  tabs.slice().reverse().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t+(t===curTab?'（今週）':'');if(t===curTab)o.selected=true;wk.appendChild(o);});
  wk.onchange=()=>{curTab=wk.value;loadWeek();};
  paintMake();
  J('/api/eggs').then(renderEgg);
  J('/api/cost').then(renderSales);
  J('/api/matstock').then(renderMatStock).catch(()=>{});
  J('/api/anko').then(renderAnko).catch(()=>{});
  stampSync();
}
async function loadWeek(){
  W=await J('/api/week');sel=Math.min(sel,6);paintMake();
  J('/api/eggs').then(renderEgg);
  J('/api/cost').then(renderSales);
  J('/api/matstock').then(renderMatStock).catch(()=>{});
  J('/api/anko').then(renderAnko).catch(()=>{});
}

// === 大本シートとの自動連携（編集中・操作直後・非表示中は避ける／全データは手動のまま） ===
let lastAct=Date.now();
['click','keydown','touchstart','input'].forEach(e=>document.addEventListener(e,()=>{lastAct=Date.now();},true));
function isEditing(){const a=document.activeElement;return !!(a&&(a.isContentEditable||['INPUT','TEXTAREA','SELECT'].includes(a.tagName)));}
function stampSync(){let b=document.getElementById('syncbadge');if(!b){b=document.createElement('div');b.id='syncbadge';b.style.cssText='position:fixed;right:8px;bottom:62px;font-size:11px;color:var(--info);background:var(--infobg);border:1px solid var(--line);border-radius:10px;padding:2px 8px;opacity:.85;z-index:4;';document.body.appendChild(b);}const n=new Date();b.textContent='🔄 大本と自動連携 ・ 最終 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
async function syncAll(force){
  if(isEditing())return;
  if(!force&&(document.visibilityState!=='visible'||Date.now()-lastAct<4000))return;
  try{
    W=await J('/api/week');sel=Math.min(sel,6);paintMake();
    J('/api/eggs').then(renderEgg);J('/api/cost').then(renderSales);J('/api/matstock').then(renderMatStock).catch(()=>{});J('/api/anko').then(renderAnko).catch(()=>{});
    stampSync();
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')syncAll(true);});
window.addEventListener('focus',()=>syncAll(true));
setInterval(()=>syncAll(false),60000);
function paintMake(){
  selBlk=Math.max(0,W.blocks.findIndex(b=>b.name==='店舗用'));
  const bb=document.getElementById('blks');bb.innerHTML='';
  W.blocks.forEach((b,i)=>{const el=document.createElement('button');el.className='blk'+(i===selBlk?' on':'');
    el.innerHTML=b.name+'<span class="cat">'+(b.category==='店舗用'?'店舗':'催事')+'</span>';
    el.onclick=()=>{selBlk=i;renderMake();};bb.appendChild(el);});
  const dd=document.getElementById('days');dd.innerHTML='';
  W.days.forEach((d,i)=>{const b=document.createElement('button');b.className='day'+(i===sel?' on':'');const w=(W.weather||[])[i];b.innerHTML=d.label+(w&&w.emoji?'<br><span class="dayw">'+w.emoji+(w.tmax!=null?Math.round(w.tmax)+'°':'')+'</span>':'');b.onclick=()=>{sel=i;renderMake();};dd.appendChild(b);});
  renderMake();
}
// その日が「昨日以前(過去)」か判定。過去＝実売(エアレジ/Airメイト)、本日以降＝予算を既定値にする
function dayDate(i){const s=((W.days||[])[i]||{}).date||'';const m=s.match(/(\d+)\D+(\d+)/);if(!m)return null;const now=new Date();const d=new Date(now.getFullYear(),+m[1]-1,+m[2]);const diff=(d-now)/86400000;if(diff>180)d.setFullYear(d.getFullYear()-1);else if(diff<-180)d.setFullYear(d.getFullYear()+1);return d;}
function isPastDay(i){const d=dayDate(i);if(!d)return false;const t=new Date();t.setHours(0,0,0,0);return d<t;}
function madeVal(p,i){if(isPastDay(i))return Number(p.sold[i]??p.made[i]??p.plan[i]??0)||0;return Number(p.made[i]??p.plan[i]??0)||0;}
function renderMake(){
  document.querySelectorAll('.blk').forEach((b,i)=>b.classList.toggle('on',i===selBlk));
  document.querySelectorAll('.day').forEach((b,i)=>b.classList.toggle('on',i===sel));
  const blk=W.blocks[selBlk];if(!blk){document.getElementById('rows').innerHTML='';return;}
  document.getElementById('title').textContent='製造計画';
  const _w=(W.weather||[])[sel];document.getElementById('wxline').innerHTML=_w&&_w.emoji?(_w.emoji+' '+_w.label+'　最高'+Math.round(_w.tmax)+'° 最低'+Math.round(_w.tmin)+'°　降水'+(_w.pop==null?'–':_w.pop+'%')):'';
  document.getElementById('totlbl').textContent=blk.name+' 実績';
  const box=document.getElementById('rows');box.innerHTML='';let tot=0;
  blk.products.forEach(p=>{
    const made=madeVal(p,sel),plan=p.plan[sel]??0,sold=p.sold[sel];tot+=made;
    const r=document.createElement('div');r.className='row';
    r.innerHTML='<div class="nm"><div class="t">'+p.name+'</div><div class="s">予算<span class="planedit" contenteditable="true" inputmode="numeric">'+plan+'</span>　売れた '+(sold==null?'–':sold)+'</div></div>'+
      '<div class="stpwrap"><div class="stplbl">実績（作った数）</div><div class="stp"><button>−</button><input class="val" type="text" inputmode="numeric" value="'+made+'"><button>＋</button></div></div>';
    const v=r.querySelector('.val'),bs=r.querySelectorAll('button'),pe=r.querySelector('.planedit');
    bs[0].onclick=()=>chg(p,-1,v);bs[1].onclick=()=>chg(p,1,v);
    pe.addEventListener('focus',()=>{pe.dataset.b=pe.textContent;});
    pe.addEventListener('blur',()=>{if(pe.textContent!==(pe.dataset.b||''))savePlan(p,pe.textContent);});
    pe.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();pe.blur();}});
    v.addEventListener('focus',()=>v.select());
    v.addEventListener('change',()=>setMade(p,v.value,v));
    v.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();v.blur();}});
    box.appendChild(r);
  });
  document.getElementById('tot').textContent=Math.round(tot);
  const k=W.kaiten[sel];document.getElementById('kai').textContent=(k==null?'–':k);
}
function setMade(p,raw,v){let cur=parseInt(String(raw).replace(/[^0-9]/g,''),10);if(isNaN(cur))cur=0;p.made[sel]=cur;v.value=cur;
  let tot=0;W.blocks[selBlk].products.forEach(x=>tot+=(x===p?cur:madeVal(x,sel)));document.getElementById('tot').textContent=Math.round(tot);
  fetch('/api/made',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tab:W.tab,block:W.blocks[selBlk].name,product:p.name,dayIndex:sel,value:cur})});}
function chg(p,d,v){const cur=madeVal(p,sel)+d;setMade(p,cur<0?0:cur,v);}
async function savePlan(p,raw){let val=parseInt(String(raw).replace(/[^0-9]/g,''),10);if(isNaN(val))val=0;p.plan[sel]=val;
  renderMake();
  if(!p.row)return;
  try{
    const r=await fetch('/api/cell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tab:W.tab,row:p.row,col:2+sel,value:val})});
    if(!r.ok)throw new Error('保存失敗');
    W=await J('/api/week');paintMake();
    J('/api/anko').then(renderAnko).catch(()=>{});
    J('/api/matstock').then(renderMatStock).catch(()=>{});
  }catch(e){
    W=await J('/api/week');paintMake();
  }}
function nz(x){if(x===''||x==null)return '–';const n=parseFloat(x);return isNaN(n)?x:(''+(Math.round(n*10)/10));}
function eChip(o){const n=parseFloat(o);let cls='na';if(!isNaN(n))cls=n<0?'bad':(n<=3?'warn':'ok');return '<span class="chip '+cls+'">見通し '+nz(o)+'</span>';}
function eline(label,o,row,col,tab){
  const stock=col>0?('<span class="estock" contenteditable="true" data-tab="'+esc(tab)+'" data-r="'+row+'" data-c="'+col+'">'+esc(o.stock||'')+'</span>'):('<b>'+nz(o.stock)+'</b>');
  let h='<div class="erow"><div class="lbl">'+label+'</div><div class="kv"><span>在庫 '+stock+'</span><span>必要 <b>'+nz(o.need)+'</b></span><span>届く <b>'+nz(o.incoming)+'</b></span></div>'+eChip(o.outlook)+'</div>';
  if(o.todo&&o.todo.trim())h+='<div class="todoln">📢 やること：'+esc(o.todo)+'</div>';
  return h;}
function renderEgg(E){
  document.getElementById('eggnote').textContent=E.note||'';
  document.getElementById('eggrule').innerHTML=(E.ruleY?esc(E.ruleY):'')+(E.ruleW?'<br>'+esc(E.ruleW):'');
  const dl=document.getElementById('eggdaylist');dl.innerHTML='';
  E.days.forEach((d,i)=>{const card=document.createElement('div');card.className='ecard';
    card.innerHTML='<div class="eh">'+d.wd+' '+(d.date||'').slice(5)+(i===sel?'<span class="chip ok" style="margin-left:8px;font-size:11px">今日</span>':'')+(d.prod?'<span class="pbadge">作る数 '+nz(d.prod)+'回転</span>':'')+'</div>'+
      eline('<span class="dot dot-y"></span>卵黄',d.yolk,d.row,E.syCol,E.tab)+eline('<span class="dot dot-w"></span>卵白',d.white,d.row,E.swCol,E.tab);
    dl.appendChild(card);});
  bindEdit(dl);
  const bl=document.getElementById('eggbatches');bl.innerHTML='';
  E.batches.forEach(b=>{const el=document.createElement('div');el.className='batch';
    el.innerHTML='<div class="bn">'+esc(b.name)+'</div><div class="bd"><span class="dot dot-y"></span>卵黄 '+nz(b.yolkKai)+'回転（'+nz(b.yolkKg)+'kg・'+nz(b.yolkBags)+'袋）<br><span class="dot dot-w"></span>卵白 '+nz(b.whiteKai)+'回転（'+nz(b.whiteKg)+'kg・'+nz(b.whiteBags)+'袋）</div>';bl.appendChild(el);});
  document.getElementById('eggguide').innerHTML=renderSecs(E.guide);
  document.getElementById('eggruleslist').innerHTML=renderSecs(E.rules);}
function renderSecs(secs){return (secs||[]).map(s=>{
  let h=(s.header&&!s.header.startsWith('📖'))?'<div class="rsh">'+esc(s.header)+'</div>':'';
  h+=(s.lines||[]).map(l=>'<div class="rsl">'+esc(l)+'</div>').join('');return h;}).join('');}
function yen(n){return '¥'+Math.round(n||0).toLocaleString();}
function scard(label,o){return '<div class="scard"><div class="sl">'+label+'</div><div class="sv"><span class="sp">予算 '+yen(o.plan)+'</span><span class="sa">実績 '+yen(o.actual)+'</span></div></div>';}
function renderSales(C){
  const laborDays=C.days.filter(d=>d.laborAir!=null);const laborSum=laborDays.reduce((a,d)=>a+(d.laborAir||0),0);
  const transSum=laborDays.reduce((a,d)=>a+(d.transportAir||0),0);
  const salesForLabor=laborDays.reduce((a,d)=>a+(d.storeActual+d.eventActual),0);
  const wpct=salesForLabor>0?Math.round(laborSum/salesForLabor*1000)/10:null;
  document.getElementById('salessum').innerHTML=scard('🏪 店舗',C.store)+scard('🎪 催事',C.event)+scard('合計',C.total)+
    '<div class="scard"><div class="sl">👷 人件費</div><div class="sv"><span class="sp">うち交通費 '+yen(transSum)+'　人件費率 '+(wpct!=null?wpct+'%':'–')+(wpct!=null&&wpct>20?' ⚠':'')+'</span><span class="sa">'+yen(laborSum)+'</span></div></div>';
  const box=document.getElementById('salesdays');box.innerHTML='';
  C.days.forEach((d,i)=>{const el=document.createElement('div');el.className='ecard';
    el.innerHTML='<div class="eh">'+d.d+(i===sel?'<span class="chip ok" style="margin-left:8px;font-size:11px">今日</span>':'')+'<span style="margin-left:auto;font-size:11px;color:var(--muted);font-weight:400">回転 '+nz(d.kaiten)+'</span></div>'+
      '<div class="erow"><div class="lbl">🏪店舗</div><div class="kv">予算 <b>'+yen(d.storePlan)+'</b>　→　実績 <b>'+yen(d.storeActual)+'</b></div></div>'+
      '<div class="erow"><div class="lbl">🎪催事</div><div class="kv">予算 <b>'+yen(d.eventPlan)+'</b>　→　実績 <b>'+yen(d.eventActual)+'</b></div></div>'+
      '<div class="erow"><div class="lbl">👷人件費</div><div class="kv">'+(d.laborAir!=null?('<b>'+yen(d.laborAir)+'</b>（うち交通費 '+yen(d.transportAir||0)+'）　人件費率 '+(d.laborPct!=null?d.laborPct+'%':'–')):'–')+'</div>'+(d.laborAlert?'<span class="chip bad">⚠20%超</span>':(d.laborPct!=null?'<span class="chip ok">OK</span>':''))+'</div>';
    box.appendChild(el);});}
function numfmt(v){const s=(v==null?'':String(v)).trim();if(s==='')return '';const n=Number(s.replace(/,/g,''));return isFinite(n)?n.toLocaleString('ja-JP'):s;}
function ankoCard(c,A,isShiro){
  if(!c)return '';
  const linked=c.url&&/^https?:/.test(c.url);
  const sup=c.supplier?('<span class="sup">'+esc(c.supplier)+(linked?' ↗':'')+'</span>'):'';
  const head=linked?('<a href="'+esc(c.url)+'" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:flex;justify-content:space-between;align-items:center;width:100%">'+esc(c.name)+sup+'</a>'):('<span>'+esc(c.name)+'</span>'+sup);
  const jun=isShiro?('<div class="junin">旬どら100個あたりの白あん <input id="junrate" type="number" inputmode="decimal" value="'+(A.junRatePer100||0)+'"> g　<span>（旬どら来週'+numfmt(A.junCountNext)+'個を加算）</span></div>'):'';
  return '<div class="ankocard"><div class="ah">'+head+'</div>'+
    '<div class="arow"><span class="lb">今週必要</span><b>'+numfmt(c.thisG)+'g</b><span class="sub">'+c.thisBags+'袋</span></div>'+
    '<div class="arow"><span class="lb">在庫</span><b>'+c.stockBags+'袋</b><span class="sub">'+numfmt(c.stockG)+'g</span></div>'+
    '<div class="arow"><span class="lb">来週必要</span><b>'+numfmt(c.nextG)+'g</b><span class="sub">'+c.nextBags+'袋</span></div>'+
    jun+
    '<div class="aorder">来週の発注 <b>'+c.orderBags+'袋</b></div></div>';
}
function renderAnko(A){
  const wrap=document.getElementById('ankolist');if(!wrap)return;
  const nx=document.getElementById('ankonext');if(nx)nx.textContent=A.nextTab?('　来週 '+A.nextTab):'　来週タブなし';
  wrap.innerHTML=ankoCard(A.tsubu,A,false)+ankoCard(A.shiro,A,true);
  const inp=document.getElementById('junrate');
  if(inp){
    const saveRate=()=>{inp.disabled=true;fetch('/api/anko_rate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:inp.value,tab:curTab})}).then(x=>x.json()).then(renderAnko).catch(()=>{inp.disabled=false;});};
    inp.addEventListener('change',saveRate);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  }
}
function invChip(o){return (o.url&&/^https?:/.test(o.url))?'<a class="chip bad" href="'+esc(o.url)+'" target="_blank" rel="noopener" style="text-decoration:none">要発注 ↗</a>':'<span class="chip bad">要発注</span>';}
function renderMatStock(V){
  const need=document.getElementById('matneed');if(need){need.textContent=V.linkedNeed?('　要発注 '+V.linkedNeed+'件'):'';need.style.color='var(--warn)';}
  const ml=document.getElementById('matlist');ml.innerHTML='';
  (V.rows||[]).forEach(r=>{const el=document.createElement('div');el.className='invrow'+(r.need?' need':'');
    const uw=r.orderUnitWord||'袋';
    const perPack=(r.orderUnit!=null&&String(r.orderUnit).trim()!=='')?(' ・ 1'+uw+numfmt(r.orderUnit)+(r.unit||'')):'';
    const bags=(r.orderBags!=null)?('（'+r.orderBags+uw+perPack+'）'):'';
    const sub='推奨発注 '+numfmt(r.order)+(r.unit||'')+bags+' ・ 入荷 '+(r.arrive||'–')+(r.linked?(r.supplier?' ・ '+esc(r.supplier):''):' ・ 在庫未連携');
    const chip=!r.linked?'<span class="chip na">未連携</span>':(r.need?invChip(r):'<span class="chip ok">OK</span>');
    el.innerHTML='<div class="invn"><div class="invt">'+esc(r.name)+'</div><div class="invs">'+sub+'</div></div>'+
      '<div class="invq"><div class="invnum">'+(r.linked?nz(r.stock):'–')+'</div><div class="invmin">在庫 ・ 最低 '+(r.min==null?'–':nz(r.min))+'</div></div>'+chip;
    ml.appendChild(el);});
  const nd=document.getElementById('invneed');if(nd){nd.textContent=V.othersNeed?('　要発注 '+V.othersNeed+'件'):'';nd.style.color='var(--warn)';}
  const box=document.getElementById('invlist');if(box){box.innerHTML='';
    (V.others||[]).forEach(it=>{const el=document.createElement('div');el.className='invrow'+(it.need?' need':'');
      el.innerHTML='<div class="invn"><div class="invt">'+esc(it.name)+'</div><div class="invs">'+esc(it.category||'')+(it.supplier?' ・ '+esc(it.supplier):'')+'</div></div>'+
        '<div class="invq"><div class="invnum">'+nz(it.total)+'</div><div class="invmin">最低 '+(it.min==null?'–':nz(it.min))+'</div></div>'+
        (it.need?invChip(it):'<span class="chip ok">OK</span>');
      box.appendChild(el);});}
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function editGrid(tab,rows,topRow,leftCol){if(!rows||!rows.length)return '';
  const mx=rows.reduce((a,r)=>Math.max(a,r.length),0);let h='<table class="rawt">';
  rows.forEach((r,ri)=>{h+='<tr>';for(let c=0;c<mx;c++){h+='<td contenteditable="true" data-tab="'+esc(tab)+'" data-r="'+(topRow+ri)+'" data-c="'+(leftCol+c)+'">'+esc(r[c]||'')+'</td>';}h+='</tr>';});
  return h+'</table>';}
function bindEdit(box){box.querySelectorAll('td').forEach(td=>{
  td.addEventListener('focus',()=>{td.dataset.before=td.textContent;});
  td.addEventListener('blur',()=>{const nv=td.textContent;if(nv!==(td.dataset.before||''))saveCell(td.dataset.tab,td.dataset.r,td.dataset.c,nv,td);});
  td.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();td.blur();}});});}
function saveCell(tab,r,c,v,td){td.style.background='#fff7d6';
  fetch('/api/cell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tab:tab,row:+r,col:+c,value:v})})
    .then(x=>x.json()).then(()=>{td.style.background='#e1f5ee';setTimeout(()=>td.style.background='',900);})
    .catch(()=>{td.style.background='#fcebeb';});}
let sheetWeeksLoaded=false;
async function setSheet(){
  const f=document.getElementById('sheetframe'),sw=document.getElementById('sheetweek');
  if(!f||!sw||typeof W==='undefined'||!W||!W.sheetId)return;
  if(!sheetWeeksLoaded){
    try{const gids=await fetchJSON('/api/gids');sw.innerHTML='';
      gids.slice().reverse().forEach(g=>{const o=document.createElement('option');o.value=String(g[1]);o.textContent=g[0];sw.appendChild(o);});
      sw.onchange=()=>{if(rawEdit){loadRawGrid(sw.options[sw.selectedIndex]?sw.options[sw.selectedIndex].text:'');}else{setSheetGid(sw.value);}};sheetWeeksLoaded=true;
    }catch(e){}
  }
  const gid=(W.gid!=null?String(W.gid):'');
  if(gid)sw.value=gid;
  if(rawEdit){loadRawGrid(sw.options[sw.selectedIndex]?sw.options[sw.selectedIndex].text:(W.tab||''));}else{setSheetGid(sw.value||gid);}
}
function setSheetGid(gid){const f=document.getElementById('sheetframe');if(!f||!W)return;gid=String(gid||'');
  if(f.dataset.gid===gid)return;f.dataset.gid=gid;
  f.src='https://docs.google.com/spreadsheets/d/'+W.sheetId+'/edit?rm=minimal'+(gid?('#gid='+gid):'');}
let rawEdit=true;
function toggleRaw(){rawEdit=!rawEdit;document.getElementById('sheetwrap').classList.toggle('hide',rawEdit);document.getElementById('rawgrid').classList.toggle('hide',!rawEdit);document.getElementById('rawmode').textContent=rawEdit?'🔳 シート表示':'📝 表で編集';const sw=document.getElementById('sheetweek');if(rawEdit){loadRawGrid(sw&&sw.selectedIndex>=0?sw.options[sw.selectedIndex].text:'');}else{setSheetGid(sw?sw.value:'');}}
async function loadRawGrid(tab){const box=document.getElementById('rawgrid');box.innerHTML='<div style="padding:14px;color:var(--muted)">読み込み中…</div>';try{const q=tab?('?tab='+encodeURIComponent(tab)):'';const r=await J('/api/raw'+q);box.innerHTML=editGrid(r.tab,r.values,1,1);bindEdit(box);applyZoom();}catch(e){box.innerHTML='<div style="padding:14px;color:#a32d2d">読み込めませんでした</div>';}}
let zoom=1;
function applyZoom(){document.documentElement.style.setProperty('--rawfs',(11*zoom).toFixed(1)+'px');const f=document.getElementById('sheetframe');if(f){if(Math.abs(zoom-1)<0.001){f.style.transform='';f.style.width='';f.style.height='';}else{const inv=(100/zoom).toFixed(1);f.style.transformOrigin='top left';f.style.transform='scale('+zoom+')';f.style.width=inv+'%';f.style.height=inv+'%';}}}
function zoomStep(d){zoom=Math.max(0.6,Math.min(2.4,+(zoom+d*0.15).toFixed(2)));applyZoom();}
init();
</script>
